; 1. 规则部分
ruleset=游戏加速,[]PROCESS-NAME,Steam.exe
ruleset=游戏加速,[]PROCESS-NAME,cs2.exe
ruleset=游戏加速,[]PROCESS-NAME,r5apex.exe
ruleset=游戏加速,[]PROCESS-NAME,LeagueClient.exe

; --- 2. 分组部分 ---
; 游戏加速：默认用“延迟最低”组，备选直连
custom_proxy_group=游戏加速`select`[]延迟最低`.*`[]DIRECT

; 延迟最低组：给游戏用的自动测速组
custom_proxy_group=延迟最低`url-test`.*`https://www.gstatic.com/generate_204`300,,50

; 漏网之鱼：首选通用代理（即你说的系统代理效果），备选直连
custom_proxy_group=漏网之鱼`select`[]DIRECT
