[custom]
; ================== 基础控制参数 ==================
; 必须开启该项，Subconverter 才会生成符合新版内核的 rule-provider
generate_rule_provider=true

; ================== 规则集定义 (严格参考官方 type:URL 规范) ==================

; 1. 拦截类（最优先）
ruleset=REJECT,clash-classic:https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/ruleset/reject.txt

; 2. 本地与特殊直连
ruleset=DIRECT,clash-classic:https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/ruleset/private.txt
ruleset=DIRECT,clash-classic:https://raw.githubusercontent.com/sola614/Sundries/master/Clash_Rule/custom_direct.list
ruleset=DIRECT,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/SteamCN/SteamCN.list
ruleset=Bilibili,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/BiliBili/BiliBili.list
ruleset=BT下载,clash-classic:https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/refs/heads/master/Clash/Download.list

; 3. 强制代理/高优先级代理
ruleset=通用代理,clash-classic:https://raw.githubusercontent.com/sola614/Sundries/master/Clash_Rule/force_proxy.list

; 4. 精准海外应用/游戏/流媒体分流（确保在 GEOIP,CN 之前命中）
ruleset=AI,clash-classic:https://raw.githubusercontent.com/sola614/Sundries/refs/heads/master/Clash_Rule/ai.list
ruleset=Cygames,clash-classic:https://raw.githubusercontent.com/sola614/sola614/master/Clash_Rule/cygames.list
ruleset=Game_Global,clash-classic:https://raw.githubusercontent.com/sola614/sola614/master/Clash_Rule/game.list
ruleset=日区网站(DMM等),clash-classic:https://raw.githubusercontent.com/sola614/sola614/master/Clash_Rule/custom_JP.list
ruleset=YouTube|Twitch,clash-classic:https://raw.githubusercontent.com/sola614/Sundries/refs/heads/master/Clash_Rule/media.list
ruleset=Github,clash-classic:https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/refs/heads/master/Clash/Ruleset/Github.list
ruleset=TikTok,clash-classic:https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/refs/heads/master/Clash/Ruleset/TikTok.list
ruleset=Spotify,clash-classic:https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/refs/heads/master/Clash/Ruleset/Spotify.list
ruleset=Netflix,clash-classic:https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/refs/heads/master/Clash/Ruleset/Netflix.list
ruleset=Netflix,clash-classic:https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/refs/heads/master/Clash/Ruleset/NetflixIP.list
ruleset=AbemaTV,clash-classic:https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/refs/heads/master/Clash/Ruleset/AbemaTV.list
ruleset=Niconico,clash-classic:https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/refs/heads/master/Clash/Ruleset/Niconico.list
ruleset=流媒体,clash-classic:https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/refs/heads/master/Clash/ProxyMedia.list
ruleset=流媒体,clash-classic:https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/refs/heads/master/Clash/Ruleset/Docker.list
ruleset=通用代理,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Steam/Steam.list

; 5. 大范围中国流量直连（GeoIP 内置规则，无特殊前缀，必须用 [] 标记）
ruleset=DIRECT,[]GEOIP,CN

; 6. 兜底与大范围海外被墙白名单
ruleset=通用代理,clash-classic:https://raw.githubusercontent.com/sola614/sola614/master/Clash_Rule/custom.list
ruleset=通用代理,clash-classic:https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/ruleset/gfw.txt
ruleset=漏网之鱼,[]MATCH


; ================== 策略组定义 (格式完全符合官方 ` 符号分割) ==================

custom_proxy_group=通用代理`select`[]延迟最低`[]故障转移`.*
custom_proxy_group=YouTube|Twitch`select`.*
custom_proxy_group=日区网站(DMM等)`select`.*
custom_proxy_group=Game_Global`select`.*
custom_proxy_group=AI`select`.*
custom_proxy_group=Github`select`[]延迟最低`.*
custom_proxy_group=Cygames`select`.*
custom_proxy_group=TikTok`select`.*
custom_proxy_group=Spotify`select`.*
custom_proxy_group=Netflix`select`.*
custom_proxy_group=AbemaTV`select`.*
custom_proxy_group=Niconico`select`.*
custom_proxy_group=Bilibili`select`[]DIRECT`.*
custom_proxy_group=流媒体`select`.*
custom_proxy_group=BT下载`select`[]DIRECT`[]通用代理
custom_proxy_group=漏网之鱼`select`[]通用代理`[]DIRECT

; 自动健康检查组设置（参照示例调整参数）
custom_proxy_group=延迟最低`url-test`.*`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group=故障转移`fallback`.*`https://www.gstatic.com/generate_204`180
